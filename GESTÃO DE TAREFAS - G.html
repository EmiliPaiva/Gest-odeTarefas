<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Tarefas — Operação do Evento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f4f4f2;
    --bg-panel: #ffffff;
    --bg-panel-2: #f0efec;
    --line: #e0ddd6;
    --text: #191919;
    --text-dim: #6b6b6b;
    --amber: #ff6b1a;
    --amber-dim: #d95a12;
    --ok: #2e9c5a;
    --warn: #d97706;
    --danger: #d8332a;
    --blue: #2f6fb0;
    --radius: 18px;
    --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
    --sans: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    --display: 'Archivo Black', 'Inter', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin:0; background:var(--bg); color:var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  ::selection{ background: var(--amber); color:#fff; }

  /* ---- Header ---- */
  header {
    position: relative;
    padding: 26px 32px 40px;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap: wrap; gap: 14px;
    background: linear-gradient(120deg, #ff7a26 0%, #ff5c00 55%, #ff6b1a 100%);
    color: #fff;
    clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%);
    overflow: hidden;
  }
  header::before{
    content:''; position:absolute; inset:0; pointer-events:none;
    background: repeating-linear-gradient(115deg, rgba(255,255,255,.09) 0 14px, transparent 14px 34px);
  }
  header::after{
    content:''; position:absolute; left:0; right:0; bottom:0; height:6px;
    background: repeating-linear-gradient(90deg, #111 0 26px, #fff 26px 52px);
  }
  .brand { display:flex; align-items:center; gap:14px; position:relative; z-index:1; }
  .brand .mark {
    width:44px; height:44px; border-radius:12px; transform: rotate(-6deg);
    background: #111;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 4px 4px 0 rgba(0,0,0,.25), 0 0 0 2px #fff inset;
  }
  .mark span{ font-family: var(--display); color:#fff; font-size:13px; letter-spacing:0.5px; transform: rotate(6deg); }
  .brand h1 { font-family: var(--display); font-size:20px; margin:0; letter-spacing:0.3px; font-weight:400; color:#fff; text-transform:uppercase; font-style:italic; }
  .brand p { margin:2px 0 0; font-size:12px; color:rgba(255,255,255,.9); font-family: var(--mono); }

  .actions { display:flex; gap:8px; flex-wrap:wrap; position:relative; z-index:1; }
  button {
    font-family: var(--sans); font-size:13px; font-weight:600; cursor:pointer;
    border-radius: 999px; border:2px solid var(--line);
    background: var(--bg-panel-2); color: var(--text);
    padding: 9px 16px; transition: all .15s ease;
  }
  button:hover { border-color: #111; transform: translateY(-1px); }
  header .actions button.ghost { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.65); color:#fff; }
  header .actions button.ghost:hover { background: rgba(255,255,255,.3); }
  button.primary { background: #111; color:#fff; border-color:#111; font-weight:700; box-shadow: 3px 3px 0 rgba(0,0,0,.15); }
  button.primary:hover { background:#2a2a2a; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 rgba(0,0,0,.2); }
  button.ghost { background:transparent; }
  button.danger:hover { border-color:var(--danger); color:var(--danger); }
  input[type=file]{ display:none; }

  /* ---- Stats strip ---- */
  .stats {
    display:grid; grid-template-columns: repeat(6,1fr);
    gap: 12px; background:transparent;
    padding: 18px 32px 6px;
  }
  .stat {
    background: var(--bg-panel); padding: 16px 18px; border-radius: 14px;
    border: 2px solid var(--line); box-shadow: 3px 3px 0 rgba(0,0,0,.05);
  }
  .stat .num { font-family: var(--display); font-size:24px; font-weight:400; }
  .stat .lbl { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.6px; margin-top:4px;}
  .stat.ok .num{ color:var(--ok); }
  .stat.warn .num{ color:var(--warn); }
  .stat.danger .num{ color:var(--danger); }
  .stat.blue .num{ color:var(--blue); }

  /* ---- Tabs ---- */
  nav.tabs {
    display:flex; gap:6px; padding: 18px 32px 0;
    background:var(--bg);
  }
  nav.tabs button {
    background: transparent; border:2px solid transparent; border-radius: 999px;
    padding:9px 18px; margin-right:6px; color:var(--text-dim);
    font-size:13.5px; font-weight:700; text-transform:uppercase; letter-spacing:.3px;
  }
  nav.tabs button.active { color:#fff; background: #111; border-color:#111; }
  nav.tabs button:hover:not(.active) { background: var(--bg-panel-2); color:var(--text); border-color:var(--line); }

  main { padding: 24px 32px 60px; max-width: 1180px; width:100%; }

  /* ---- Sidebar layout (drawer via botão) ---- */
  .layout { display:flex; align-items:flex-start; }
  .menu-toggle {
    display:flex; align-items:center; gap:8px; position:relative; z-index:1;
  }
  .menu-toggle .bar { display:block; width:20px; height:2px; background:#fff; border-radius:2px; }
  .menu-toggle .bars { display:flex; flex-direction:column; gap:4px; }

  .sidebar-overlay {
    position:fixed; inset:0; background:rgba(20,15,10,.45); z-index:90;
    opacity:0; pointer-events:none; transition: opacity .2s ease;
  }
  .sidebar-overlay.show { opacity:1; pointer-events:auto; }

  .sidebar {
    width: 250px; flex-shrink:0; position: fixed; top:0; left:0; bottom:0;
    padding: 22px 14px; display:flex; flex-direction:column; gap:6px;
    background: var(--bg-panel);
    border-right: 2px solid var(--line);
    z-index: 95;
    transform: translateX(-100%);
    transition: transform .22s ease;
    box-shadow: 6px 0 0 rgba(0,0,0,.05);
    overflow-y: auto;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-head {
    display:flex; align-items:center; justify-content:space-between;
    padding: 4px 6px 14px; margin-bottom:8px; border-bottom:1px solid var(--line);
  }
  .sidebar-head .stitle { font-family: var(--display); font-style:italic; text-transform:uppercase; font-size:14px; }
  .sidebar-close { padding:6px 10px; border-radius:10px; }
  .side-link {
    text-align:left; background:transparent; border:2px solid transparent; border-radius: 12px;
    padding: 11px 16px; font-weight:700; color:var(--text-dim); text-transform:uppercase;
    font-size:12.5px; letter-spacing:.3px; display:flex; align-items:center; gap:10px;
  }
  .side-link.active { background:#111; color:#fff; box-shadow: 3px 3px 0 rgba(0,0,0,.1); }
  .side-link:hover:not(.active) { background: var(--bg-panel-2); color:var(--text); border-color:var(--line); transform: translateY(-1px); }

  /* ---- Dashboard ---- */
  .dash-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:18px; }
  .dash-grid .span2 { grid-column: 1 / -1; }
  .dash-card {
    background: var(--bg-panel); border:2px solid var(--line); border-radius: var(--radius);
    overflow:hidden;
  }
  .dash-card .dh {
    padding: 14px 18px; background:#111; color:#fff;
    display:flex; align-items:center; justify-content:space-between;
  }
  .dash-card .dh .t { font-family: var(--display); font-style:italic; text-transform:uppercase; font-size:13px; font-weight:400; letter-spacing:.3px; }
  .dash-card .dh .sub { font-family: var(--mono); font-size:11px; color: var(--amber); }
  .dash-card .db { padding: 16px 18px; }

  .dbar-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .dbar-row:last-child { margin-bottom:0; }
  .dbar-label { width:120px; flex-shrink:0; font-size:12.5px; font-weight:600; }
  .dbar-track { flex:1; height:10px; background: var(--bg-panel-2); border-radius:999px; overflow:hidden; border:1px solid var(--line); }
  .dbar-fill { height:100%; border-radius:999px; }
  .dbar-val { width:82px; flex-shrink:0; text-align:right; font-family:var(--mono); font-size:11.5px; color:var(--text-dim); }

  .legend-row { display:flex; flex-wrap:wrap; gap:14px; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text-dim); font-weight:600; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }

  .chart-flex { display:flex; gap:22px; align-items:center; flex-wrap:wrap; }
  .chart-flex .chart-svg-wrap { flex-shrink:0; position:relative; width:130px; height:130px; }
  .chart-flex .chart-svg-wrap svg { width:100%; height:100%; }
  .chart-center-label { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .chart-center-label .n { font-family:var(--display); font-size:20px; }
  .chart-center-label .l { font-size:9.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; }
  .chart-legend { flex:1; min-width:140px; display:flex; flex-direction:column; gap:8px; }
  .chart-legend-item { display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:12.5px; font-weight:600; }
  .chart-legend-item .lname { display:flex; align-items:center; gap:8px; }
  .chart-legend-item .lval { font-family:var(--mono); font-size:11.5px; color:var(--text-dim); font-weight:500; }

  .bars-chart { display:flex; align-items:flex-end; gap:10px; height:140px; padding-top:10px; }
  .bars-chart .bcol { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; height:100%; }
  .bars-chart .bcol .bstack { width:100%; max-width:34px; border-radius:8px 8px 4px 4px; display:flex; flex-direction:column-reverse; overflow:hidden; background:var(--bg-panel-2); border:1px solid var(--line); }
  .bars-chart .bcol .bstack .seg { width:100%; }
  .bars-chart .bcol .bpct { font-family:var(--mono); font-size:10.5px; color:var(--text-dim); }
  .bars-chart .bcol .blabel { font-size:10.5px; font-weight:700; color:var(--text-dim); text-align:center; max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .section-divider { display:flex; align-items:center; gap:10px; margin: 4px 0 2px; }
  .section-divider .st { font-family:var(--display); font-style:italic; font-size:12px; text-transform:uppercase; color:var(--text-dim); letter-spacing:.4px; }
  .section-divider::after { content:''; flex:1; height:1px; background:var(--line); }

  .kpi-mini-grid { display:grid; grid-template-columns: repeat(4,1fr); gap:12px; }
  .kpi-mini { background: var(--bg-panel-2); border:2px solid var(--line); border-radius: 14px; padding:14px; text-align:center; }
  .kpi-mini .n { font-family: var(--display); font-size:22px; }
  .kpi-mini .l { font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; margin-top:4px; }

  .dl-item {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding: 10px 0; border-bottom: 1px solid var(--line); font-size:13px;
  }
  .dl-item:last-child { border-bottom:none; }
  .dl-item .dl-name { font-weight:600; }
  .dl-item .dl-meta { color:var(--text-dim); font-size:11.5px; }
  .dl-item .dl-days {
    font-family:var(--mono); font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px;
    white-space:nowrap;
  }
  .dl-days.late { background:rgba(216,51,42,.14); color:var(--danger); }
  .dl-days.soon { background:rgba(255,107,26,.14); color:var(--amber-dim); }
  .dl-days.ok { background:rgba(46,156,90,.12); color:var(--ok); }

  @media (max-width: 1100px){
    .dash-grid { grid-template-columns: 1fr; }
    .kpi-mini-grid { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width: 640px){
    .sidebar { width: 82vw; max-width:280px; }
  }

  /* ---- Filter bar ---- */
  .filterbar {
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    margin-bottom: 20px; padding: 14px 16px; background:var(--bg-panel);
    border:2px solid var(--line); border-radius: var(--radius);
  }
  .filterbar select, .filterbar input[type=text] {
    background:var(--bg-panel-2); border:2px solid var(--line); color:var(--text);
    border-radius:999px; padding:7px 14px; font-size:13px; font-family:var(--sans); font-weight:500;
  }
  .filterbar input[type=text] { min-width:200px; }
  .filterbar .spacer{ flex:1; }

  /* ---- Bulk edit bar ---- */
  .bulkbar {
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    margin-bottom:16px; padding: 12px 16px; background:#111; color:#fff;
    border-radius: var(--radius); box-shadow: 3px 3px 0 rgba(0,0,0,.1);
  }
  .bulkbar .bulk-count { font-size:13px; font-weight:600; white-space:nowrap; }
  .bulkbar .bulk-count strong { color:var(--amber); font-family:var(--display); font-size:15px; }
  .bulk-field { display:flex; align-items:center; gap:6px; }
  .bulk-field label { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:rgba(255,255,255,.6); font-weight:700; white-space:nowrap; }
  .bulk-field select {
    background: rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.3); color:#fff;
    border-radius:999px; padding:6px 12px; font-size:12.5px; font-family:var(--sans); font-weight:600;
  }
  .bulk-field select option { color:#111; }
  .bulk-field input[type=date]{
    background: rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.3); color:#fff;
    border-radius:999px; padding:6px 12px; font-size:12.5px; font-family:var(--sans); font-weight:600;
    color-scheme: dark;
  }
  .bulk-field button.ghost { background:rgba(255,255,255,.16); border-color:rgba(255,255,255,.5); color:#fff; padding:6px 11px; }
  .bulkbar .spacer{ flex:1; }
  .bulkbar button.ghost { background:rgba(255,255,255,.16); border-color:rgba(255,255,255,.5); color:#fff; }
  .bulkbar button.ghost:hover { background:rgba(255,255,255,.3); }
  tbody tr.row-selected { background: #fff4ec; }
  input.rowChk, #chkAll { width:16px; height:16px; cursor:pointer; accent-color:#111; }

  /* ---- Table ---- */
  table { width:100%; border-collapse: collapse; font-size:13.5px; }
  thead th {
    text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--text-dim); padding:12px 12px; border-bottom:2px solid #111;
    position: sticky; top:0; background:var(--bg-panel);
  }
  tbody tr { border-bottom:1px solid var(--line); }
  tbody tr:hover { background: #fff4ec; }
  tbody td { padding:11px 12px; vertical-align:middle; }
  .group-row td {
    background: #111; font-weight:700; letter-spacing:0.5px;
    color: var(--amber); font-size:11.5px; text-transform:uppercase;
    padding: 9px 12px; border-radius: 8px;
  }

  .badge {
    display:inline-block; padding:4px 12px; border-radius:999px; font-size:11px; font-weight:700;
    border:2px solid transparent; white-space:nowrap; text-transform:uppercase; letter-spacing:.2px;
  }
  .st-Concluído, .st-Concluido { background:rgba(46,156,90,.14); color:var(--ok); border-color:rgba(46,156,90,.4);}
  .st-Emandamento, .st-EmAndamento { background:rgba(47,111,176,.14); color:var(--blue); border-color:rgba(47,111,176,.4);}
  .st-Atrasado { background:rgba(216,51,42,.14); color:var(--danger); border-color:rgba(216,51,42,.4);}
  .st-Naoiniciado, .st-NãoIniciado { background:rgba(107,107,107,.1); color:var(--text-dim); border-color:rgba(107,107,107,.3);}

  .pr-Alta { color: var(--danger); font-weight:700;}
  .pr-Média, .pr-Media { color: var(--warn); font-weight:600;}
  .pr-Baixa { color: var(--text-dim); }

  .bar-wrap { width:90px; height:7px; background:var(--line); border-radius:999px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:6px;}
  .bar-fill { height:100%; background: linear-gradient(90deg, var(--amber-dim), var(--amber)); }
  .pct-txt { font-family:var(--mono); font-size:11px; color:var(--text-dim); }

  .row-actions { display:flex; gap:6px; }
  .row-actions button { padding:6px 10px; font-size:12px; }

  /* ---- status badge as clickable control ---- */
  .badge.clickable { cursor:pointer; border-style:dashed; }
  .badge.clickable:hover { filter:brightness(1.15); transform: translateY(-1px); }
  .status-menu {
    position:fixed; z-index:200; background:#fff; border:2px solid #111;
    border-radius:14px; box-shadow:5px 5px 0 rgba(0,0,0,.15); overflow:hidden; min-width:150px;
  }
  .status-menu-item { padding:10px 16px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .status-menu-item:hover { background: var(--bg-panel-2); color:var(--amber-dim); }
  .status-menu-note { padding:9px 14px; font-size:11px; color:var(--text-dim); border-top:1px solid var(--line); max-width:200px; white-space:normal; }

  /* ---- view toggle ---- */
  .viewtoggle { display:flex; border:2px solid #111; border-radius: 999px; overflow:hidden; }
  .viewtoggle button { border:none; border-radius:0; padding:8px 16px; background:#fff; font-weight:700; }
  .viewtoggle button.active { background:#111; color:#fff; }
  .viewtoggle button:hover { filter:none; }

  /* ---- kanban ---- */
  .kanban { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; align-items:start; }
  .kcol { background:var(--bg-panel); border:2px solid var(--line); border-radius: var(--radius); min-height: 120px; overflow:hidden; }
  .kcol-head { padding:13px 16px; border-bottom:2px solid var(--line); display:flex; align-items:center; justify-content:space-between; background: var(--bg-panel-2); }
  .kcol[data-col="Não iniciado"] .kcol-head { border-top: 5px solid var(--text-dim); }
  .kcol[data-col="Em andamento"] .kcol-head { border-top: 5px solid var(--blue); }
  .kcol[data-col="Atrasado"] .kcol-head { border-top: 5px solid var(--danger); }
  .kcol[data-col="Concluído"] .kcol-head { border-top: 5px solid var(--ok); }
  .kcol-head .kt { font-weight:800; font-size:12.5px; text-transform:uppercase; letter-spacing:.4px; }
  .kcol-head .kc { font-family:var(--mono); font-size:11.5px; color:var(--text-dim); background:#fff; border-radius:999px; padding:2px 10px; border:1px solid var(--line); }
  .kcol-body { padding:12px; display:flex; flex-direction:column; gap:10px; min-height:80px; transition: background .15s ease; }
  .kcol-body.dragover { background: rgba(255,107,26,.08); outline:2px dashed var(--amber-dim); }
  .kcard {
    background: #fff; border:2px solid var(--line); border-radius:12px; padding:11px 13px;
    cursor:grab; font-size:12.5px; box-shadow: 2px 2px 0 rgba(0,0,0,.04);
  }
  .kcard:hover { border-color:#111; }
  .kcard:active { cursor:grabbing; }
  .kt-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .kcard .kt-name { font-weight:700; }
  .kt-move {
    flex-shrink:0; border:2px solid var(--line); border-radius:8px; background:var(--bg-panel-2);
    font-size:13px; line-height:1; padding:5px 7px; cursor:pointer; color:var(--text-dim);
  }
  .kt-move:hover { border-color:#111; color:#111; }
  .kcard .kt-meta { display:flex; flex-wrap:wrap; gap:6px; color:var(--text-dim); font-size:11px; margin-bottom:6px; }
  .kcol.late-col .kcol-head .kt { color: var(--danger); }
  @media (max-width: 1000px){ .kanban{ grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px){ .kanban{ grid-template-columns: 1fr; } }

  .deadline { font-family: var(--mono); font-size:12.5px; }
  .deadline.late { color: var(--danger); font-weight:700; }
  .deadline.clickable { cursor:pointer; border-bottom:1px dashed currentColor; padding-bottom:1px; }
  .deadline.clickable:hover { filter:brightness(1.3); }
  .date-popover {
    position:fixed; z-index:200; background:#fff; border:2px solid #111;
    border-radius:14px; box-shadow:5px 5px 0 rgba(0,0,0,.15); overflow:hidden; padding:12px;
  }
  .date-popover input[type=date]{
    background:var(--bg-panel-2); border:2px solid var(--line); color:var(--text);
    padding:8px 10px; border-radius:10px; font-size:13.5px; font-family:var(--sans);
  }
  .date-popover .dp-actions{ display:flex; justify-content:flex-end; gap:6px; margin-top:8px; }
  .date-popover .dp-actions button{ padding:6px 12px; font-size:12px; }

  /* ---- Cards (Por Responsável / Por Time) ---- */
  .cards-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap:18px;
  }
  .person-card {
    background:var(--bg-panel); border:2px solid var(--line); border-radius: var(--radius);
    overflow:hidden; transition: box-shadow .15s ease, transform .15s ease;
  }
  .person-card:hover { box-shadow: 4px 4px 0 rgba(0,0,0,.06); transform: translateY(-2px); }
  .person-card .ph {
    padding: 15px 18px; border-bottom:2px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    background: #111;
  }
  .person-card .ph .name { font-weight:800; font-size:14.5px; color:#fff; text-transform:uppercase; letter-spacing:.3px; }

  @media (max-width: 900px){

<script>
/* ================= DADOS BASE (extraídos da planilha) ================= */
let GRUPOS = ["Estrutura","Comunicação","Orçamento","Ativações","Comercial","RH"];
let TIMES = ["RH"];
let MEMBROS = ["Emili","Danielle","Isabela"];

function dstr(br){ // dd/mm/yyyy -> yyyy-mm-dd
  const [d,m,y] = br.split('/'); return `${y}-${m}-${d}`;
}
let uid = 1;
function T(grupo,tarefa,time,resp,prazo,status,prio,pct,obs){
  return {id: uid++, grupo, tarefa, time, responsavel: resp||"", prazo: dstr(prazo), status, prioridade: prio, pct: parseInt(pct), obs: obs||""};
}
let TASKS = [
  T("Estrutura","Definir local do evento","RH","Emili","15/07/2025","Atrasado","Alta",90,"Contrato assinado"),
  T("Estrutura","Montar estrutura de balcões","RH","Danielle","18/07/2025","Em andamento","Alta",50,"Aguardando fornecedor"),
  T("Estrutura","Instalar iluminação temática","RH","Isabela","19/07/2025","Não iniciado","Média",0,""),

  T("Estrutura","Montar área VIP","RH","","19/07/2025","Não iniciado","Média",0,""),
  T("Estrutura","Organizar fluxo de entrada/saída","RH","","18/07/2025","Não iniciado","Baixa",0,"Aguarda planta baixa"),
  T("Comunicação","Criar identidade visual do evento","RH","Emili","10/07/2025","Concluído","Alta",100,"Aprovado pelo cliente"),
  T("Comunicação","Desenvolver materiais gráficos","RH","","12/07/2025","Em andamento","Alta",70,"Banners e cardápios"),
  T("Comunicação","Publicar posts nas redes sociais","RH","Isabela","20/07/2025","Não iniciado","Média",0,"Cronograma pendente"),
  T("Comunicação","Enviar convites digitais","RH","","13/07/2025","Concluído","Alta",100,"Lista enviada"),
  T("Comunicação","Gerenciar confirmações de presença","RH","Danielle","16/07/2025","Em andamento","Média",40,""),
  T("Comunicação","Criar hashtag e estratégia online","RH","","14/07/2025","Concluído","Baixa",100,""),
  T("Orçamento","Levantar custo de bebidas","RH","","08/07/2025","Concluído","Alta",100,"Cotação com 3 fornecedores"),
  T("Orçamento","Negociar contratos com fornecedores","RH","","11/07/2025","Concluído","Alta",100,"Descontos obtidos"),
  T("Orçamento","Controlar despesas em tempo real","RH","","20/07/2025","Em andamento","Alta",30,"Planilha atualizada"),
  T("Orçamento","Definir preço de venda / ticket","RH","Emili","09/07/2025","Concluído","Alta",100,""),
  T("Orçamento","Reservar fundo de emergência","RH","","10/07/2025","Concluído","Alta",100,"5% do orçamento total"),
  T("Orçamento","Fechar relatório financeiro","RH","","22/07/2025","Não iniciado","Média",0,""),
  T("Ativações","Planejar estações de drinks","RH","","14/07/2025","Em andamento","Alta",55,"Cardápio definido"),
  T("Ativações","Contratar bartenders especialistas","RH","","12/07/2025","Concluído","Alta",100,"3 profissionais"),
  T("Ativações","Definir drinks exclusivos do evento","RH","","13/07/2025","Concluído","Média",100,"Teste realizado"),
  T("Ativações","Montar estação de drinks sem álcool","RH","","16/07/2025","Em andamento","Média",40,""),
  T("Ativações","Criar experiência de mixologia","RH","","17/07/2025","Não iniciado","Baixa",0,"Confirmar atrações"),
  T("Ativações","Organizar brindes e cortesias","RH","","18/07/2025","Não iniciado","Baixa",0,""),
  T("Comercial","Prospectar patrocinadores","RH","","05/07/2025","Concluído","Alta",100,"2 patrocinadores fechados"),
  T("Comercial","Negociar cotas de patrocínio","RH","","08/07/2025","Concluído","Alta",100,""),
  T("Comercial","Venda de ingressos / mesa","RH","","20/07/2025","Em andamento","Alta",65,"70% vendido"),
  T("Comercial","Fechar parceria fornecedor bebidas","RH","","10/07/2025","Concluído","Alta",100,"Exclusividade"),
  T("Comercial","Elaborar proposta para parceiros","RH","","07/07/2025","Concluído","Média",100,""),
  T("Comercial","Relatório de vendas pós-evento","RH","","22/07/2025","Não iniciado","Média",0,""),
  T("RH","Recrutar equipe de garçons","RH","","10/07/2025","Concluído","Alta",100,"10 contratados"),
  T("RH","Treinar equipe de atendimento","RH","","15/07/2025","Em andamento","Alta",50,"Treinamento em andamento"),
  T("RH","Definir uniformes da equipe","RH","","13/07/2025","Concluído","Média",100,""),
  T("RH","Escalar equipe de segurança","RH","","14/07/2025","Concluído","Alta",100,"Empresa contratada"),
  T("RH","Briefing geral da equipe no dia","RH","","20/07/2025","Não iniciado","Alta",0,"Dia do evento: 07h"),
  T("RH","Avaliar desempenho pós-evento","RH","","22/07/2025","Não iniciado","Baixa",0,""),
];

let editingId = null;
let currentTab = 'dashboard';

/* ================= UTILS ================= */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 2200);
}
function slug(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,''); }
function fmtDate(iso){
  if(!iso) return '—';
  const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`;
}
function isLate(task){
  if(task.status==='Concluído') return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = new Date(task.prazo+'T00:00:00');
  return dl < today;
}
// Status "inteligente": se o prazo já passou e a tarefa não está concluída, ela é
// automaticamente tratada como Atrasado em toda a interface, mesmo que o status
// salvo seja "Não iniciado" ou "Em andamento" — a menos que o usuário tenha
// movido/alterado manualmente o status (manualOverride), o que "congela" o status
// escolhido até o prazo ser editado novamente.
function effectiveStatus(task){
  if(task.manualOverride) return task.status;
  return isLate(task) ? 'Atrasado' : task.status;
}
const STATUS_OPTIONS = ['Não iniciado','Em andamento','Concluído'];
const KANBAN_COLUMNS = ['Não iniciado','Em andamento','Atrasado','Concluído'];

function closeStatusMenu(){ document.querySelectorAll('.status-menu').forEach(m=>m.remove()); }
window.openStatusMenu = function(ev, id){
  ev.stopPropagation();
  closeStatusMenu();
  const t = TASKS.find(x=>x.id===id); if(!t) return;
  const menu = document.createElement('div');
  menu.className = 'status-menu';
  menu.innerHTML = STATUS_OPTIONS.map(s=>`<div class="status-menu-item" data-s="${s}">${s}</div>`).join('')
    + (isLate(t) ? `<div class="status-menu-note">O prazo já passou. Ao escolher um status aqui, ele fica fixo (não volta sozinho para "Atrasado") até você editar o prazo.</div>` : '');
  document.body.appendChild(menu);
  const rect = ev.currentTarget.getBoundingClientRect();
  const top = rect.bottom + 6;
  const left = Math.min(rect.left, window.innerWidth - 210);
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';
  menu.querySelectorAll('.status-menu-item').forEach(item=>{
    item.onclick = (e)=>{
      e.stopPropagation();
      t.status = item.dataset.s;
      t.manualOverride = isLate(t);
      closeStatusMenu();
      renderAll();
      toast('Status atualizado.');
    };
  });
  setTimeout(()=> document.addEventListener('click', closeStatusMenu, {once:true}), 0);
};
function fillSelect(sel, arr, withEmpty, emptyLabel){
  sel.innerHTML='';
  if(withEmpty){ const o=document.createElement('option'); o.value=''; o.textContent=emptyLabel; sel.appendChild(o); }
  arr.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
}

/* ================= RENDER: FILTER DROPDOWNS ================= */
function refreshDropdowns(){
  fillSelect(document.getElementById('fGrupo'), GRUPOS, true, 'Grupo (todos)');
  fillSelect(document.getElementById('fTime'), TIMES, true, 'Time (todos)');
  fillSelect(document.getElementById('fResp'), MEMBROS, true, 'Responsável (todos)');
  fillSelect(document.getElementById('fldGrupo'), GRUPOS, false);
  fillSelect(document.getElementById('fldTime'), TIMES, false);
  fillSelect(document.getElementById('fldResp'), MEMBROS, true, 'Sem responsável');
  fillBulkDropdowns();
}

/* ================= STATS ================= */
function renderStats(){
  const total = TASKS.length;
  const done = TASKS.filter(t=>effectiveStatus(t)==='Concluído').length;
  const doing = TASKS.filter(t=>effectiveStatus(t)==='Em andamento').length;
  const late = TASKS.filter(t=>effectiveStatus(t)==='Atrasado').length;
  const todo = TASKS.filter(t=>effectiveStatus(t)==='Não iniciado').length;
  const avgPct = total? Math.round(TASKS.reduce((s,t)=>s+t.pct,0)/total) : 0;

  const cells = [
    {n: total, l:'Total de tarefas', cls:''},
    {n: done, l:'Concluídas', cls:'ok'},
    {n: doing, l:'Em andamento', cls:'blue'},
    {n: todo, l:'Não iniciadas', cls:''},
    {n: late, l:'Atrasadas', cls:'danger'},
    {n: avgPct+'%', l:'Progresso médio', cls:'warn'},
  ];
  document.getElementById('statsBar').innerHTML = cells.map(c=>
    `<div class="stat ${c.cls}"><div class="num">${c.n}</div><div class="lbl">${c.l}</div></div>`
  ).join('');
}

/* ================= FILTERS (tab Geral) ================= */
function getFilters(){
  return {
    q: document.getElementById('fSearch').value.trim().toLowerCase(),
    grupo: document.getElementById('fGrupo').value,
    time: document.getElementById('fTime').value,
    resp: document.getElementById('fResp').value,
    status: document.getElementById('fStatus').value,
    prio: document.getElementById('fPrio').value,
  };
}
function applyFilters(list){
  const f = getFilters();
  return list.filter(t=>{
    if(f.q && !t.tarefa.toLowerCase().includes(f.q) && !(t.obs||'').toLowerCase().includes(f.q)) return false;
    if(f.grupo && t.grupo!==f.grupo) return false;
    if(f.time && t.time!==f.time) return false;
    if(f.resp && t.responsavel!==f.resp) return false;
    if(f.status && effectiveStatus(t)!==f.status) return false;
    if(f.prio && t.prioridade!==f.prio) return false;
    return true;
  });
}

/* ================= RENDER: TABELA GERAL ================= */
function renderGeral(){
  const tbody = document.getElementById('tbodyGeral');
  const filtered = applyFilters(TASKS);
  if(filtered.length===0){
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="big">🗂️</div>Nenhuma tarefa encontrada com esses filtros.</div></td></tr>`;
    return;
  }
  // agrupa por grupo mantendo ordem de GRUPOS
  const byGroup = {};
  filtered.forEach(t=>{ (byGroup[t.grupo] = byGroup[t.grupo]||[]).push(t); });
  let html = '';
  const orderedGroups = GRUPOS.filter(g=>byGroup[g]).concat(Object.keys(byGroup).filter(g=>!GRUPOS.includes(g)));
  orderedGroups.forEach(g=>{
    html += `<tr class="group-row"><td colspan="10">${g}</td></tr>`;
    byGroup[g].forEach(t=>{
      const late = isLate(t);
      const es = effectiveStatus(t);
      const statusClass = 'st-'+slug(es);
      html += `<tr data-id="${t.id}" class="${selectedIds.has(t.id)?'row-selected':''}">
        <td data-label="Selecionar"><input type="checkbox" class="rowChk" data-id="${t.id}" ${selectedIds.has(t.id)?'checked':''} onchange="toggleSelect(${t.id}, this.checked)"></td>
        <td data-label="Tarefa"><strong>${escapeHtml(t.tarefa)}</strong></td>
        <td data-label="Time">${escapeHtml(t.time)}</td>
        <td data-label="Responsável">${t.responsavel? escapeHtml(t.responsavel) : '<span style="color:var(--text-dim)">—</span>'}</td>
        <td data-label="Prazo"><span class="deadline clickable ${late?'late':''}" onclick="openDatePopover(event, ${t.id})">📅 ${fmtDate(t.prazo)}</span></td>
        <td data-label="Status"><span class="badge clickable ${statusClass}" onclick="openStatusMenu(event, ${t.id})">${es}</span></td>
        <td data-label="Prioridade"><span class="pr-${slug(t.prioridade)}">${t.prioridade}</span></td>
        <td data-label="Progresso"><span class="bar-wrap"><span class="bar-fill" style="width:${t.pct}%"></span></span><span class="pct-txt">${t.pct}%</span></td>
        <td data-label="Obs." style="max-width:180px; color:var(--text-dim); font-size:12px;">${escapeHtml(t.obs||'')}</td>
        <td><div class="row-actions">
          <button onclick="openEdit(${t.id})">✎</button>
          <button class="danger" onclick="deleteTask(${t.id})">🗑</button>
        </div></td>
      </tr>`;

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

let draggingId = null;
window.kDragStart = (ev, id)=>{ draggingId = id; ev.dataTransfer.effectAllowed = 'move'; };

window.kDragLeave = (ev)=>{ ev.currentTarget.classList.remove('dragover'); };
window.kDrop = (ev, col)=>{
  ev.preventDefault();
  ev.currentTarget.classList.remove('dragover');
  if(draggingId==null) return;
  const t = TASKS.find(x=>x.id===draggingId);
  if(!t){ draggingId=null; return; }
  if(col==='Atrasado'){
    toast('"Atrasado" é automático — mude o prazo ou conclua a tarefa.');
    draggingId = null;
    return;
  }
  t.status = col;
  // Se o prazo já passou, marcamos como override manual para o status escolhido
  // "grudar" em vez de voltar automaticamente para Atrasado.
  t.manualOverride = isLate(t);
  draggingId = null;
  renderAll();
  toast('Status atualizado.');
};

// Menu "mover para..." — alternativa ao arrastar, essencial no celular (toque)
window.openMoveMenu = function(ev, id){
  ev.stopPropagation();
  closeStatusMenu(); closeDatePopover();
  document.querySelectorAll('.status-menu').forEach(m=>m.remove());
  const t = TASKS.find(x=>x.id===id); if(!t) return;
  const current = effectiveStatus(t);
  const targets = KANBAN_COLUMNS.filter(c=>c!=='Atrasado' && c!==current);
  const menu = document.createElement('div');
  menu.className = 'status-menu';
  menu.innerHTML = targets.map(c=>`<div class="status-menu-item" data-c="${c}">Mover para "${c}"</div>`).join('')
    || '<div class="status-menu-note">Sem outras colunas disponíveis.</div>';
  document.body.appendChild(menu);
  const rect = ev.currentTarget.getBoundingClientRect();
  let top = rect.bottom + 6;
  let left = Math.min(rect.left, window.innerWidth - 210);
  if(top + 160 > window.innerHeight) top = rect.top - 160;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';
  menu.querySelectorAll('.status-menu-item').forEach(item=>{
    item.onclick = (e)=>{
      e.stopPropagation();
      t.status = item.dataset.c;
      t.manualOverride = isLate(t);
      menu.remove();
      renderAll();
      toast('Status atualizado.');
    };
  });
  setTimeout(()=> document.addEventListener('click', ()=>menu.remove(), {once:true}), 0);
};

/* ================= IMPORTAR CSV (planilha Sheets) ================= */
function parseCSV(text){
  // remove BOM
  text = text.replace(/^\uFEFF/, '');
  const firstLine = text.split(/\r?\n/)[0] || '';
  const delim = (firstLine.split(';').length > firstLine.split(',').length) ? ';' : ',';
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c==='"' && next==='"'){ field+='"'; i++; }
      else if(c==='"'){ inQuotes=false; }
      else field += c;
    } else {
      if(c==='"'){ inQuotes = true; }
      else if(c===delim){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c==='\r'){ /* ignore */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=> r.some(c=>c.trim()!==''));
}

function normHeader(h){
  return (h||'').toString().trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'');
}

function toISODate(v){
  v = (v||'').toString().trim();
  if(!v) return dstr(''); // hoje/vazio
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(v)) return dstr(v);
  const d = new Date(v);
  if(!isNaN(d)) return d.toISOString().slice(0,10);
  return dstr('');
}

function normStatus(v){
  const s = normHeader(v);
  if(s.includes('conclu')) return 'Concluído';
  if(s.includes('andamento')) return 'Em andamento';
  if(s.includes('atras')) return 'Atrasado';
  return 'Não iniciado';
}
function normPrio(v){
  const s = normHeader(v);
  if(s.startsWith('alt')) return 'Alta';
  if(s.startsWith('baix')) return 'Baixa';
  return 'Média';
}

document.getElementById('btnImportCSVTrigger').onclick = ()=> document.getElementById('fileImportCSV').click();
document.getElementById('fileImportCSV').onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const rows = parseCSV(reader.result);
      if(rows.length < 2){ toast('Planilha vazia ou inválida.'); return; }
      const headers = rows[0].map(normHeader);
      const idx = (names)=> headers.findIndex(h=> names.includes(h));
      const iGrupo = idx(['grupo','grupodedemanda']);
      const iTarefa = idx(['tarefa','atividade','nome']);
      const iTime = idx(['time','equipe']);
      const iResp = idx(['responsavel']);
      const iPrazo = idx(['prazo','data','datalimite']);
      const iStatus = idx(['status']);
      const iPrio = idx(['prioridade']);
      const iPct = idx(['conclusao','pctconclusao','progresso']);
      const iObs = idx(['observacao','obs','observacoes']);

      let count = 0;
      for(let r=1;r<rows.length;r++){
        const row = rows[r];
        const grupo = iGrupo>=0 ? (row[iGrupo]||'').trim() : '';
        const tarefa = iTarefa>=0 ? (row[iTarefa]||'').trim() : '';
        if(!tarefa) continue;
        const time = iTime>=0 ? (row[iTime]||'').trim() : '';
        const resp = iResp>=0 ? (row[iResp]||'').trim() : '';
        const prazoRaw = iPrazo>=0 ? (row[iPrazo]||'').trim() : '';
        const status = iStatus>=0 ? normStatus(row[iStatus]) : 'Não iniciado';
        const prio = iPrio>=0 ? normPrio(row[iPrio]) : 'Média';
        const pctRaw = iPct>=0 ? (row[iPct]||'').toString().replace('%','').trim() : '0';
        const pct = isNaN(parseInt(pctRaw)) ? 0 : Math.max(0,Math.min(100,parseInt(pctRaw)));
        const obs = iObs>=0 ? (row[iObs]||'').trim() : '';

        const prazoISO = prazoRaw ? toISODate(prazoRaw) : new Date().toISOString().slice(0,10);

        TASKS.push({
          id: uid++, grupo, tarefa, time, responsavel: resp,
          prazo: prazoISO, status, prioridade: prio, pct, obs
        });

        if(grupo && !GRUPOS.includes(grupo)) GRUPOS.push(grupo);
        if(time && !TIMES.includes(time)) TIMES.push(time);
        if(resp && !MEMBROS.includes(resp)) MEMBROS.push(resp);
        count++;
      }
      renderAll();
      toast(count ? `${count} tarefa(s) importada(s) da planilha.` : 'Nenhuma tarefa válida encontrada.');
    } catch(err){
      console.error(err);
      toast('Erro ao ler o CSV. Verifique o formato do arquivo.');
    }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
};

  document.getElementById('fldTime').value = TIMES[0]||'';
  document.getElementById('fldResp').value = '';
  document.getElementById('fldPrazo').value = new Date().toISOString().slice(0,10);
  document.getElementById('fldStatus').value = 'Não iniciado';
  document.getElementById('fldPrio').value = 'Média';
  document.getElementById('fldPct').value = 0;
  document.getElementById('fldObs').value = '';
  overlay.classList.add('show');
}
window.openEdit = (id)=>{
  const t = TASKS.find(x=>x.id===id); if(!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar tarefa';
  document.getElementById('btnDeleteTask').style.display = '';
  document.getElementById('fldTarefa').value = t.tarefa;
  document.getElementById('fldGrupo').value = t.grupo;
  document.getElementById('fldTime').value = t.time;
  document.getElementById('fldResp').value = t.responsavel;
  document.getElementById('fldPrazo').value = t.prazo;
  document.getElementById('fldStatus').value = t.status;
  document.getElementById('fldPrio').value = t.prioridade;
  document.getElementById('fldPct').value = t.pct;
  document.getElementById('fldObs').value = t.obs;
  overlay.classList.add('show');
};
function closeModal(){ overlay.classList.remove('show'); }

document.getElementById('btnSaveTask').onclick = ()=>{
  const tarefa = document.getElementById('fldTarefa').value.trim();
  if(!tarefa){ toast('Dê um nome para a tarefa.'); return; }
  const data = {
    tarefa,
    grupo: document.getElementById('fldGrupo').value,
    time: document.getElementById('fldTime').value,
    responsavel: document.getElementById('fldResp').value,
    prazo: document.getElementById('fldPrazo').value,
    status: document.getElementById('fldStatus').value,
    prioridade: document.getElementById('fldPrio').value,
    pct: Math.max(0, Math.min(100, parseInt(document.getElementById('fldPct').value)||0)),
    obs: document.getElementById('fldObs').value.trim(),
  };
  if(editingId){
    const t = TASKS.find(x=>x.id===editingId);
    Object.assign(t, data);
    t.manualOverride = false; // prazo/status podem ter mudado; volta a detecção automática
    toast('Tarefa atualizada.');
  } else {
    data.id = uid++;
    data.manualOverride = false;
    TASKS.push(data);
    toast('Tarefa criada.');
  }
  closeModal();
  renderAll();
};
function closeDatePopover(){ document.querySelectorAll('.date-popover').forEach(m=>m.remove()); }
window.openDatePopover = function(ev, id){
  ev.stopPropagation();
  closeStatusMenu();
  closeDatePopover();
  const t = TASKS.find(x=>x.id===id); if(!t) return;
  const pop = document.createElement('div');
  pop.className = 'date-popover';
  pop.innerHTML = `
    <input type="date" id="dpInput" value="${t.prazo}">
    <div class="dp-actions">
      <button class="ghost" id="dpCancel">Cancelar</button>
      <button class="primary" id="dpSave">Salvar</button>
    </div>`;
  document.body.appendChild(pop);
  const rect = ev.currentTarget.getBoundingClientRect();
  const popRect = { w: 220, h: 100 };
  let top = rect.bottom + 6;
  let left = rect.left;
  if(left + popRect.w > window.innerWidth) left = window.innerWidth - popRect.w - 10;
  if(top + popRect.h > window.innerHeight) top = rect.top - popRect.h - 6;
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  const input = pop.querySelector('#dpInput');
  input.focus();
  pop.querySelector('#dpCancel').onclick = (e)=>{ e.stopPropagation(); closeDatePopover(); };
  pop.querySelector('#dpSave').onclick = (e)=>{
    e.stopPropagation();
    if(input.value){
      t.prazo = input.value;
      t.manualOverride = false; // prazo mudou: deixa a detecção automática de "Atrasado" recalcular
      renderAll();
      toast('Prazo atualizado.');
    }
    closeDatePopover();
  };
  pop.onclick = (e)=> e.stopPropagation();
  setTimeout(()=> document.addEventListener('click', closeDatePopover, {once:true}), 0);
};
window.deleteTask = (id)=>{
  if(!confirm('Excluir esta tarefa?')) return;
  TASKS = TASKS.filter(t=>t.id!==id);
  renderAll();
  toast('Tarefa excluída.');
};
document.getElementById('btnDeleteTask').onclick = ()=>{
  if(editingId){ deleteTask(editingId); closeModal(); }
};

/* ================= DASHBOARD ================= */
const STATUS_COLORS = {
  'Concluído': 'var(--ok)',
  'Em andamento': 'var(--blue)',
  'Não iniciado': 'var(--text-dim)',
  'Atrasado': 'var(--danger)',
};
const PRIO_COLORS = { 'Alta':'var(--danger)', 'Média':'var(--warn)', 'Baixa':'var(--text-dim)' };

function daysBetween(iso){
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = new Date(iso+'T00:00:00');
  return Math.round((dl - today) / 86400000);
}

function dbarRow(label, count, total, color){
  const pct = total ? Math.round((count/total)*100) : 0;
  return `<div class="dbar-row">
    <div class="dbar-label">${escapeHtml(label)}</div>
    <div class="dbar-track"><div class="dbar-fill" style="width:${pct}%; background:${color};"></div></div>
    <div class="dbar-val">${count} · ${pct}%</div>
  </div>`;
}

// Donut chart: segments = [{label,count,color}]
function donutChart(segments, centerNum, centerLabel){
  const total = segments.reduce((s,seg)=>s+seg.count,0) || 1;
  const R = 52, C = 2*Math.PI*R;
  let offset = 0;
  const rings = segments.map(seg=>{
    const frac = seg.count/total;
    const len = frac*C;
    const dash = `${len} ${C-len}`;
    const circle = `<circle r="${R}" cx="65" cy="65" fill="none" stroke="${seg.color}" stroke-width="18"
      stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 65 65)"></circle>`;
    offset += len;
    return circle;
  }).join('');
  const legend = segments.map(seg=>{
    const pct = Math.round((seg.count/total)*100);
    return `<div class="chart-legend-item">
      <span class="lname"><span class="legend-dot" style="background:${seg.color}"></span>${escapeHtml(seg.label)}</span>
      <span class="lval">${seg.count} · ${pct}%</span>
    </div>`;
  }).join('');
  return `<div class="chart-flex">
    <div class="chart-svg-wrap">
      <svg viewBox="0 0 130 130">
        <circle r="${R}" cx="65" cy="65" fill="none" stroke="var(--bg-panel-2)" stroke-width="18"></circle>
        ${rings}
      </svg>
      <div class="chart-center-label"><div class="n">${centerNum}</div><div class="l">${escapeHtml(centerLabel)}</div></div>
    </div>
    <div class="chart-legend">${legend}</div>
  </div>`;
}

// Radial gauge for a single percentage value
function radialGauge(pct, color, label){
  const R = 52, C = 2*Math.PI*R;
  const len = (pct/100)*C;
  return `<div class="chart-svg-wrap">
    <svg viewBox="0 0 130 130">
      <circle r="${R}" cx="65" cy="65" fill="none" stroke="var(--bg-panel-2)" stroke-width="18"></circle>
      <circle r="${R}" cx="65" cy="65" fill="none" stroke="${color}" stroke-width="18"
        stroke-dasharray="${len} ${C-len}" stroke-linecap="round" transform="rotate(-90 65 65)"></circle>
    </svg>
    <div class="chart-center-label"><div class="n">${pct}%</div><div class="l">${escapeHtml(label)}</div></div>
  </div>`;
}

// Vertical stacked bar chart: items = [{label, done, total, color}]
function barsChart(items){
  if(!items.length) return '<div class="empty-note">Sem dados para exibir.</div>';
  return `<div class="bars-chart">
    ${items.map(it=>{
      const pct = it.total ? Math.round((it.done/it.total)*100) : 0;
      const h = Math.max(pct,4);
      return `<div class="bcol">
        <div class="bpct">${pct}%</div>
        <div class="bstack" style="height:${h}%;">
          <div class="seg" style="height:100%; background:${it.color};"></div>
        </div>
        <div class="blabel" title="${escapeHtml(it.label)}">${escapeHtml(it.label)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderDashboard(){
  const total = TASKS.length;
  const grid = document.getElementById('dashGrid');
  if(!total){
    grid.innerHTML = `<div class="dash-card span2"><div class="db"><div class="empty-state"><div class="big">📊</div>Cadastre tarefas para ver os indicadores aqui.</div></div></div>`;
    return;
  }

  // --- KPIs
  const done = TASKS.filter(t=>effectiveStatus(t)==='Concluído').length;
  const doing = TASKS.filter(t=>effectiveStatus(t)==='Em andamento').length;
  const late = TASKS.filter(t=>effectiveStatus(t)==='Atrasado').length;
  const todo = TASKS.filter(t=>effectiveStatus(t)==='Não iniciado').length;
  const avgPct = Math.round(TASKS.reduce((s,t)=>s+t.pct,0)/total);

  const kpiHtml = `
    <div class="dash-card span2">
      <div class="dh"><span class="t">Visão geral</span><span class="sub">${total} tarefas no total</span></div>
      <div class="db">
        <div class="chart-flex">
          ${radialGauge(avgPct, 'var(--amber)', 'progresso médio')}
          <div class="kpi-mini-grid" style="flex:1;">
            <div class="kpi-mini"><div class="n" style="color:var(--ok)">${done}</div><div class="l">Concluídas</div></div>
            <div class="kpi-mini"><div class="n" style="color:var(--blue)">${doing}</div><div class="l">Em andamento</div></div>
            <div class="kpi-mini"><div class="n" style="color:var(--text-dim)">${todo}</div><div class="l">Não iniciadas</div></div>
            <div class="kpi-mini"><div class="n" style="color:var(--danger)">${late}</div><div class="l">Atrasadas</div></div>
          </div>
        </div>
      </div>
    </div>`;

  // --- Status breakdown
  const statusHtml = `
    <div class="dash-card">
      <div class="dh"><span class="t">Por status</span></div>
      <div class="db">
        ${donutChart([
          {label:'Concluído', count:done, color:STATUS_COLORS['Concluído']},
          {label:'Em andamento', count:doing, color:STATUS_COLORS['Em andamento']},
          {label:'Não iniciado', count:todo, color:STATUS_COLORS['Não iniciado']},
          {label:'Atrasado', count:late, color:STATUS_COLORS['Atrasado']},
        ], total, 'tarefas')}
        <div class="section-divider"><span class="st">Em barras</span></div>
        ${dbarRow('Concluído', done, total, STATUS_COLORS['Concluído'])}
        ${dbarRow('Em andamento', doing, total, STATUS_COLORS['Em andamento'])}
        ${dbarRow('Não iniciado', todo, total, STATUS_COLORS['Não iniciado'])}
        ${dbarRow('Atrasado', late, total, STATUS_COLORS['Atrasado'])}
      </div>
    </div>`;

  // --- Priority breakdown
  const prios = ['Alta','Média','Baixa'];
  const prioHtml = `
    <div class="dash-card">
      <div class="dh"><span class="t">Por prioridade</span></div>
      <div class="db">
        ${donutChart(prios.map(p=>({label:p, count:TASKS.filter(t=>t.prioridade===p).length, color:PRIO_COLORS[p]})), total, 'tarefas')}
        <div class="section-divider"><span class="st">Em barras</span></div>
        ${prios.map(p=>dbarRow(p, TASKS.filter(t=>t.prioridade===p).length, total, PRIO_COLORS[p])).join('')}
      </div>
    </div>`;

  // --- Por grupo
  const groupItems = GRUPOS.map(g=>{
    const gt = TASKS.filter(t=>t.grupo===g);
    return {label:g, done: gt.filter(t=>effectiveStatus(t)==='Concluído').length, total: gt.length, color:'var(--amber)'};
  });
  const groupHtml = `
    <div class="dash-card">
      <div class="dh"><span class="t">Por grupo de demanda</span></div>
      <div class="db">
        ${GRUPOS.length ? barsChart(groupItems) : '<div class="empty-note">Sem grupos cadastrados.</div>'}
        ${GRUPOS.length ? `<div class="section-divider"><span class="st">Em barras</span></div>
        ${groupItems.map(it=>dbarRow(it.label, it.done, it.total||1, it.color)).join('')}` : ''}
      </div>
    </div>`;

  // --- Por time
  const teamItems = TIMES.map(tm=>{
    const tt = TASKS.filter(t=>t.time===tm);
    return {label:tm, done: tt.filter(t=>effectiveStatus(t)==='Concluído').length, total: tt.length, color:'var(--blue)'};
  });
  const teamHtml = `
    <div class="dash-card">
      <div class="dh"><span class="t">Progresso por time</span></div>
      <div class="db">
        ${TIMES.length ? barsChart(teamItems) : '<div class="empty-note">Sem times cadastrados.</div>'}
        ${TIMES.length ? `<div class="section-divider"><span class="st">Em barras</span></div>
        ${teamItems.map(it=>dbarRow(it.label, it.done, it.total||1, it.color)).join('')}` : ''}
      </div>
    </div>`;

  // --- Por responsável
  const respWithTasks = MEMBROS.filter(m=>TASKS.some(t=>t.responsavel===m));
  const memberItems = respWithTasks.map(m=>{
    const mt = TASKS.filter(t=>t.responsavel===m);
    return {label:m, done: mt.filter(t=>effectiveStatus(t)==='Concluído').length, total: mt.length, color:'var(--ok)'};
  });
  const memberHtml = `
    <div class="dash-card">
      <div class="dh"><span class="t">Progresso por responsável</span></div>
      <div class="db">
        ${respWithTasks.length ? barsChart(memberItems) : '<div class="empty-note">Nenhuma tarefa com responsável definido.</div>'}
        ${respWithTasks.length ? `<div class="section-divider"><span class="st">Em barras</span></div>
        ${memberItems.map(it=>dbarRow(it.label, it.done, it.total, it.color)).join('')}` : ''}
      </div>
    </div>`;

  // --- Próximos prazos (não concluídas, ordenadas por data, top 6)
  const upcoming = TASKS.filter(t=>effectiveStatus(t)!=='Concluído' && effectiveStatus(t)!=='Atrasado')
    .sort((a,b)=> a.prazo.localeCompare(b.prazo)).slice(0,6);
  const upcomingHtml = `
    <div class="dash-card">
      <div class="dh"><span class="t">Próximos prazos</span></div>
      <div class="db">
        ${upcoming.length ? upcoming.map(t=>{
          const d = daysBetween(t.prazo);
          const cls = d<=1 ? 'soon' : 'ok';
          const label = d===0 ? 'hoje' : d===1 ? '1 dia' : d+' dias';
          return `<div class="dl-item">
            <div><div class="dl-name">${escapeHtml(t.tarefa)}</div><div class="dl-meta">${escapeHtml(t.grupo)} · ${escapeHtml(t.responsavel||'sem responsável')}</div></div>
            <span class="dl-days ${cls}">${label}</span>
          </div>`;
        }).join('') : '<div class="empty-note">Nada previsto por enquanto.</div>'}
      </div>
    </div>`;

  // --- Atrasadas
  const lateTasks = TASKS.filter(t=>effectiveStatus(t)==='Atrasado')
    .sort((a,b)=> a.prazo.localeCompare(b.prazo));
  const lateHtml = `
    <div class="dash-card">
      <div class="dh"><span class="t">Tarefas atrasadas</span><span class="sub">${lateTasks.length}</span></div>
      <div class="db">
        ${lateTasks.length ? lateTasks.map(t=>{
          const d = Math.abs(daysBetween(t.prazo));
          return `<div class="dl-item">
            <div><div class="dl-name">${escapeHtml(t.tarefa)}</div><div class="dl-meta">${escapeHtml(t.grupo)} · ${escapeHtml(t.responsavel||'sem responsável')}</div></div>
            <span class="dl-days late">${d}d atraso</span>
          </div>`;
        }).join('') : '<div class="empty-note">Nenhuma tarefa atrasada. 🎉</div>'}
      </div>
    </div>`;

  grid.innerHTML = kpiHtml + statusHtml + prioHtml + groupHtml + teamHtml + memberHtml + upcomingHtml + lateHtml;
}

/* ================= RENDER ALL ================= */
function renderAll(){
  refreshDropdowns();
  renderStats();
  if(currentTab==='dashboard') renderDashboard();
  if(currentTab==='geral'){ if(currentView==='kanban') renderKanban(); else renderGeral(); }
  if(currentTab==='responsavel') renderGroupedCards('gridResp','responsavel', MEMBROS, 'Sem responsável definido');
  if(currentTab==='time') renderGroupedCards('gridTime','time', TIMES, '');
  if(currentTab==='config') renderConfigLists();
}
renderAll();
